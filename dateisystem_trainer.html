<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dateisystem-Trainer - Betriebssysteme</title>
<link rel="icon" href="data:,">
<style>
:root {
  --bg: #f5f6fa;
  --paper: #ffffff;
  --ink: #151b2d;
  --muted: #5d6678;
  --line: #d8deea;
  --accent: #1f5eff;
  --good: #0f766e;
  --hot: #b42318;
  --mid: #925200;
  --soft: #f8fafc;
  --code: #eef2f8;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  color: var(--ink);
  background: linear-gradient(180deg, #eef3ff 0, var(--bg) 260px);
  line-height: 1.5;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.wrap { max-width: 1320px; margin: 0 auto; padding: 24px; }
.topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 18px; }
.back {
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 10px;
  padding: 8px 11px;
}
.small-label { color: var(--muted); font-size: 13px; }
.hero, .panel, .sheet {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 18px;
  box-shadow: 0 10px 32px rgba(21, 32, 51, .07);
}
.hero { padding: 26px 28px; margin-bottom: 18px; }
.hero h1 { margin: 0; font-size: clamp(30px, 5vw, 52px); line-height: 1.05; letter-spacing: 0; }
.hero p { color: var(--muted); max-width: 940px; margin: 12px 0 0; font-size: 17px; }
.tabs { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
button, select, input {
  border: 1px solid #b6c3e0;
  background: #fff;
  color: #1d2939;
  border-radius: 10px;
  padding: 9px 11px;
  font: inherit;
}
button { cursor: pointer; }
button:hover { background: #eef3ff; }
button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
button.secondary { background: #f8fafc; }
select, input { width: 100%; }
label { display: block; color: var(--muted); font-size: 13px; margin: 10px 0 6px; }
.layout { display: grid; grid-template-columns: minmax(0, 360px) minmax(0, 1fr); gap: 18px; align-items: start; }
.panel, .sheet { padding: 18px; min-width: 0; }
.panel h2, .sheet h2 { margin: 0 0 12px; font-size: 21px; }
.panel h3, .sheet h3 { margin: 18px 0 8px; font-size: 16px; }
.button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.button-row.single { grid-template-columns: 1fr; }
.mode { display: none; }
.mode.active { display: block; }
.answer-grid { display: grid; gap: 10px; margin-top: 10px; }
.answer-grid input.bad, .answer-grid select.bad { border-color: var(--hot); background: #fff3f1; }
.answer-grid input.ok, .answer-grid select.ok { border-color: var(--good); background: #ecfdf8; }
.result {
  min-height: 48px;
  border-left: 5px solid var(--line);
  background: #f8fafc;
  border-radius: 12px;
  padding: 12px 13px;
  margin-top: 12px;
}
.result.good { border-left-color: var(--good); background: #ecfdf8; }
.result.bad { border-left-color: var(--hot); background: #fff3f1; }
.note {
  border: 1px dashed #b6c3e0;
  background: #fbfdff;
  border-radius: 14px;
  padding: 12px 14px;
  margin-top: 14px;
  color: #344054;
  font-size: 14px;
}
.note strong { color: #20315f; }
.facts {
  border: 1px solid var(--line);
  border-radius: 14px;
  overflow: hidden;
  margin: 12px 0 16px;
}
.facts table { width: 100%; border-collapse: collapse; font-size: 14px; }
.facts th, .facts td { border-bottom: 1px solid var(--line); padding: 9px 10px; text-align: left; vertical-align: top; }
.facts tr:last-child th, .facts tr:last-child td { border-bottom: 0; }
.facts th { width: 230px; background: #f1f5ff; color: #26324a; }
code { font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace; background: var(--code); padding: 1px 5px; border-radius: 6px; }
.formula-list {
  display: grid;
  gap: 8px;
  margin: 14px 0;
}
.formula-list div {
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 10px 12px;
  background: #fff;
}
.solution {
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px;
  margin-top: 14px;
  background: #fff;
}
.solution.locked { color: var(--muted); background: #fbfdff; }
.tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 14px; }
.tag {
  display: inline-flex;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 4px 9px;
  background: #f8fafc;
  color: #344054;
  font-size: 13px;
  font-weight: 650;
}
.visual {
  border: 1px solid var(--line);
  border-radius: 16px;
  background: #fbfcff;
  padding: 16px;
  margin: 14px 0;
  overflow-x: auto;
}
.fat-bar {
  display: grid;
  grid-template-columns: repeat(8, minmax(54px, 1fr));
  border: 1px solid #98a2b3;
  background: #fff;
  min-width: 620px;
}
.fat-cell {
  border-right: 1px solid #98a2b3;
  min-height: 64px;
  padding: 8px;
  display: grid;
  place-items: center;
  text-align: center;
  font: 700 13px "Cascadia Mono", Consolas, monospace;
}
.fat-cell:last-child { border-right: 0; }
.fat-cell.used { background: #eef3ff; }
.fat-cell.cluster { background: #ecfdf8; }
.chain {
  display: flex;
  align-items: stretch;
  min-width: 720px;
  gap: 8px;
}
.block {
  width: 110px;
  border: 1px solid #777;
  background: #fff;
  display: grid;
  grid-template-columns: 1fr 28px;
  min-height: 72px;
  font-family: "Times New Roman", Times, serif;
}
.block .data { display: grid; place-items: center; padding: 8px; }
.block .ptr { display: grid; place-items: center; border-left: 1px dashed #777; background: #fff6e7; font-weight: 700; }
.arrow { display: grid; place-items: center; color: var(--hot); font-size: 28px; font-weight: 700; }
.inode-svg {
  width: 100%;
  min-width: 760px;
  height: auto;
  font-family: "Times New Roman", Times, serif;
}
.inode-svg .box { fill: #fff; stroke: #333; stroke-width: 1.4; }
.inode-svg .box-soft { fill: #f8fafc; stroke: #333; stroke-width: 1.4; }
.inode-svg .edge { fill: none; stroke: #333; stroke-width: 1.4; marker-end: url(#arrow); }
.inode-svg .txt { font-weight: 700; font-size: 17px; }
.inode-svg .sub { font-size: 13px; }
.exam {
  border: 1px solid #777;
  background: #fff;
  padding: 18px;
  font-family: "Times New Roman", Times, serif;
  color: #000;
  min-width: 720px;
}
.exam h3 { font-size: 19px; margin: 0 0 12px; }
.exam table { border-collapse: collapse; margin: 10px 0 14px; width: 100%; }
.exam th, .exam td { border: 1px solid #777; padding: 5px 7px; text-align: left; vertical-align: top; }
.exam ol { margin: 8px 0 0 22px; padding: 0; }
.exam li { margin: 7px 0; }
.mini-table { border-collapse: collapse; width: 100%; margin-top: 8px; }
.mini-table th, .mini-table td { border: 1px solid var(--line); padding: 7px 8px; text-align: left; }
.mini-table th { background: #f8fafc; }
@media (max-width: 980px) {
  .wrap { padding: 14px; }
  .topbar { align-items: flex-start; flex-direction: column; }
  .layout { grid-template-columns: minmax(0, 1fr); }
  .button-row { grid-template-columns: 1fr; }
}
</style>
</head>

        ],
        visual: { type: "exam" },
        fields: [
          { id: "a", label: "a) FAT-Obergrenze ohne Cluster", answer: "32", unit: "MiB", accept: ["33554432"] },
          { id: "b", label: "b) FAT-Obergrenze mit Cluster", answer: "256", unit: "MiB", accept: ["268435456"] },
          { id: "c", label: "c) 652-Byte-Datei ohne Cluster belegt", answer: "1024", unit: "Byte" },
          { id: "d", label: "d) 652-Byte-Datei mit Cluster belegt", answer: "4096", unit: "Byte" },
          { id: "e", label: "e) I-Node maximale Nutzdateigröße", answer: "266240", unit: "Byte", accept: ["260"] },
          { id: "f", label: "f) Zusammenhängende Belegung passt besonders für", type: "choice", answer: "readonly", options: [["", "Bitte wählen"], ["readonly", "read-only / selten wachsende Medien"], ["random", "häufig wachsende Dateien"], ["tiny", "nur sehr kleine Dateien"]] }
        ],
        steps: [
          "a) 2^16 × 512 Byte = 33554432 Byte = 32 MiB.",
          "b) Clustergröße: 2^3 × 512 = 4096 Byte. 2^16 × 4096 Byte = 256 MiB.",
          "c) Ohne Cluster: ceil(652 / 512) = 2 Blöcke, also 1024 Byte.",
          "d) Mit 4096-Byte-Clustern: ein Cluster reicht, also 4096 Byte.",
          "e) I-Node: 8 + 4 × 128 = 520 Datenblöcke. 520 × 512 Byte = 266240 Byte = 260 KiB.",
          "f) Zusammenhängende Belegung ist schnell, aber Wachstum ist schwierig. Gut passt sie für read-only oder selten veränderliche Medien."
        ]
      }
    ]
  }
};

const state = {
  mode: "fat",
  indices: { fat: 0, linked: 0, inode: 0, exam: 0 },
  solutionVisible: { fat: false, linked: false, inode: false, exam: false },
  answers: {}
};

function currentExample(mode = state.mode) {
  return trainers[mode].examples[state.indices[mode]];
}

function answerKey(mode) {
  return `${mode}:${state.indices[mode]}`;
}

function cacheAnswers(mode) {
  const ex = currentExample(mode);
  const saved = {};
  ex.fields.forEach(field => {
    const input = $(`${mode}_${field.id}`);
    if (input) saved[field.id] = input.value;
  });
  state.answers[answerKey(mode)] = saved;
}

function savedValue(mode, fieldId) {
  return state.answers[answerKey(mode)]?.[fieldId] ?? "";
}

function escapeAttr(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;");
}

function normalizeText(value) {
  return String(value ?? "")
    .trim()
    .toLowerCase()
    .replace(/×/g, "x")
    .replace(/\s+/g, "")
    .replace(/bytes?/g, "")
    .replace(/einträge/g, "")
    .replace(/eintraege/g, "")
    .replace(/blöcke/g, "")
    .replace(/bloecke/g, "")
    .replace(/block/g, "")
    .replace(/mib/g, "")
    .replace(/kib/g, "")
    .replace(/gib/g, "");
}

function numericValue(value) {
  let raw = String(value ?? "").trim().toLowerCase().replace(",", ".");
  raw = raw.replace(/[\s']/g, "");
  if (/^\d{1,3}(\.\d{3})+($|[^0-9])/.test(raw)) {
    raw = raw.replace(/\./g, "");
  }
  const match = raw.match(/-?\d+(\.\d+)?/);
  return match ? Number(match[0]) : NaN;
}

function valueMatches(actualRaw, field) {
  if (field.type === "choice") {
    return actualRaw === field.answer;
  }
  const actual = numericValue(actualRaw);
  const expected = numericValue(field.answer);
  if (Number.isFinite(actual) && Number.isFinite(expected)) {
    const tolerance = field.tolerance ?? 0.0001;
    if (Math.abs(actual - expected) <= tolerance) return true;
  }
  const actualText = normalizeText(actualRaw);
  const accepted = [field.answer, ...(field.accept ?? [])].map(normalizeText);
  return accepted.includes(actualText);
}

function renderMode(mode) {
  state.mode = mode;
  for (const key of Object.keys(trainers)) {
    $(`${key}Mode`).classList.toggle("active", key === mode);
    $(`${key}ModeBtn`).classList.toggle("active", key === mode);
  }
}

function renderAllModes() {
  Object.keys(trainers).forEach(renderTrainer);
  renderMode(state.mode);
}

function renderTrainer(mode) {
  const trainer = trainers[mode];
  const ex = currentExample(mode);
  const section = $(`${mode}Mode`);
  section.innerHTML = `
    <div class="layout">
      <aside class="panel">
        <h2>${trainer.title}</h2>
        <label for="${mode}Example">${trainer.label}</label>
        <select id="${mode}Example">${trainer.examples.map((item, index) => `<option value="${index}" ${index === state.indices[mode] ? "selected" : ""}>${item.selectTitle ?? item.title}</option>`).join("")}</select>
        <div class="button-row">
          <button type="button" id="${mode}Next">Nächstes Beispiel</button>
          <button type="button" id="${mode}SolutionBtn" class="secondary">${state.solutionVisible[mode] ? "Lösung ausblenden" : "Musterlösung"}</button>
        </div>
        <div class="button-row single">
          <button type="button" id="${mode}Check">Antwort prüfen</button>
        </div>
        <h3>Deine Antwort</h3>
        <div id="${mode}Answers" class="answer-grid">${buildFields(mode, ex)}</div>
        <div id="${mode}Result" class="result">Rechne zuerst selbst und prüfe dann deine Antwort.</div>
        <div class="note">${trainer.note}</div>
      </aside>
      <main class="sheet">
        <h2>${ex.title}</h2>
        <p>${ex.prompt}</p>
        <div class="tags">${ex.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}</div>
        <div class="facts"><table><tbody>${ex.facts.map(row => `<tr><th>${row[0]}</th><td>${row[1]}</td></tr>`).join("")}</tbody></table></div>
        <div class="visual">${buildVisual(ex)}</div>
        <div id="${mode}Steps" class="formula-list">${buildSteps(mode)}</div>
        <div id="${mode}Solution" class="solution ${state.solutionVisible[mode] ? "" : "locked"}">${buildSolution(mode)}</div>
      </main>
    </div>`;

  $(`${mode}Example`).addEventListener("change", (event) => {
    cacheAnswers(mode);
    state.indices[mode] = Number(event.target.value);
    state.solutionVisible[mode] = false;
    renderTrainer(mode);
  });
  $(`${mode}Next`).addEventListener("click", () => {
    cacheAnswers(mode);
    state.indices[mode] = (state.indices[mode] + 1) % trainer.examples.length;
    state.solutionVisible[mode] = false;
    renderTrainer(mode);
  });
  $(`${mode}SolutionBtn`).addEventListener("click", () => {
    cacheAnswers(mode);
    state.solutionVisible[mode] = !state.solutionVisible[mode];
    refreshSolution(mode);
  });
  $(`${mode}Check`).addEventListener("click", () => checkAnswers(mode));
}

function buildFields(mode, ex) {
  return ex.fields.map(field => {
    const id = `${mode}_${field.id}`;
    const current = savedValue(mode, field.id);
    if (field.type === "choice") {
      return `<div><label for="${id}">${field.label}</label><select id="${id}" data-field="${field.id}">${field.options.map(([value, label]) => `<option value="${value}" ${current === value ? "selected" : ""}>${label}</option>`).join("")}</select></div>`;
    }
    const unit = field.unit ? ` <span class="small-label">(${field.unit})</span>` : "";
    return `<div><label for="${id}">${field.label}${unit}</label><input id="${id}" data-field="${field.id}" inputmode="decimal" autocomplete="off" placeholder="Zahl" value="${escapeAttr(current)}"></div>`;
  }).join("");
}

function buildSteps(mode) {
  const ex = currentExample(mode);
  return ex.steps.map((step, index) => `<div><strong>${index + 1}.</strong> ${state.solutionVisible[mode] ? step : "..."}</div>`).join("");
}

function buildSolution(mode) {
  const ex = currentExample(mode);
  if (!state.solutionVisible[mode]) return "Musterlösung ist ausgeblendet.";
  return `<strong>Musterlösung:</strong><table class="mini-table"><tbody>${ex.fields.map(field => {
    const answer = field.type === "choice"
      ? field.options.find(([value]) => value === field.answer)?.[1]
      : `${field.answer}${field.unit ? " " + field.unit : ""}`;
    return `<tr><th>${field.label}</th><td><code>${answer}</code></td></tr>`;
  }).join("")}</tbody></table>`;
}

function refreshSolution(mode) {
  $(`${mode}SolutionBtn`).textContent = state.solutionVisible[mode] ? "Lösung ausblenden" : "Musterlösung";
  $(`${mode}Steps`).innerHTML = buildSteps(mode);
  $(`${mode}Solution`).className = `solution ${state.solutionVisible[mode] ? "" : "locked"}`;
  $(`${mode}Solution`).innerHTML = buildSolution(mode);
}

function buildVisual(ex) {
  const visual = ex.visual ?? { type: "fat" };
  if (visual.type === "chain") return buildChainVisual(visual);
  if (visual.type === "inode") return buildInodeVisual(visual);
  if (visual.type === "exam") return buildExamVisual();
  return buildFatVisual(visual);
}

function buildFatVisual(visual) {
  const cells = Array.from({ length: 8 }, (_, index) => {
    const used = visual.fileBlocks && index < visual.fileBlocks;
    const cluster = visual.cluster && !used;
    const label = used ? `Datei<br>Block ${index + 1}` : cluster ? `Cluster<br>${index + 1}` : `FAT<br>${index}`;
    return `<div class="fat-cell ${used ? "used" : cluster ? "cluster" : ""}">${label}</div>`;
  }).join("");
  return `<div class="fat-bar">${cells}</div><p class="small-label">FAT rechnet immer in ganzen Zuordnungseinheiten: Block oder Cluster.</p>`;
}

function buildChainVisual(visual) {
  const blocks = Array.from({ length: visual.blocks }, (_, index) => `
    <div class="block"><div class="data">Daten<br>${index + 1}</div><div class="ptr">${visual.pointer}</div></div>
    ${index < visual.blocks - 1 ? `<div class="arrow">→</div>` : ""}`
  ).join("");
  return `<div class="chain">${blocks}</div><p class="small-label">Bei der einfachen verketteten Liste kostet jeder Zeiger Platz im Datenblock.</p>`;
}

function buildInodeVisual(visual) {
  const single = visual.single ?? 0;
  const double = visual.double ?? 0;
  return `
    <svg class="inode-svg" viewBox="0 0 860 330" role="img" aria-label="I-Node mit direkter und indirekter Adressierung">
      <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#333"/></marker></defs>
      <rect class="box" x="30" y="110" width="150" height="92" rx="4"></rect>
      <text class="txt" x="105" y="142" text-anchor="middle">I-Node</text>
      <text class="sub" x="105" y="165" text-anchor="middle">${visual.direct} direkte</text>
      <text class="sub" x="105" y="184" text-anchor="middle">Blockadressen</text>
      <path class="edge" d="M180 132 C245 80 285 62 340 62"></path>
      <rect class="box-soft" x="340" y="38" width="150" height="48" rx="4"></rect>
      <text class="sub" x="415" y="67" text-anchor="middle">${visual.direct} Datenblöcke</text>
      <path class="edge" d="M180 158 L340 158"></path>
      <rect class="box-soft" x="340" y="128" width="150" height="60" rx="4"></rect>
      <text class="sub" x="415" y="152" text-anchor="middle">${single} einfach indirekt</text>
      <text class="sub" x="415" y="171" text-anchor="middle">je ${visual.perBlock} Adressen</text>
      <path class="edge" d="M490 158 C555 130 590 116 645 116"></path>
      <rect class="box-soft" x="645" y="92" width="155" height="48" rx="4"></rect>
      <text class="sub" x="722" y="121" text-anchor="middle">Datenblöcke</text>
      <path class="edge" d="M180 188 C245 248 285 270 340 270"></path>
      <rect class="box-soft" x="340" y="240" width="150" height="60" rx="4"></rect>
      <text class="sub" x="415" y="264" text-anchor="middle">${double} doppelt indirekt</text>
      <text class="sub" x="415" y="283" text-anchor="middle">${visual.perBlock}² Datenblöcke</text>
      <path class="edge" d="M490 270 C555 260 590 230 645 205"></path>
      <rect class="box-soft" x="645" y="180" width="155" height="48" rx="4"></rect>
      <text class="sub" x="722" y="209" text-anchor="middle">viele Datenblöcke</text>
    </svg>`;
}

function buildExamVisual() {
  return `
    <div class="exam">
      <h3>Klausurbeispiel: Dateisysteme</h3>
      <p>Die Festplatte erlaubt Zugriff auf Blöcke der Größe 512 Byte. Ein FAT-Dateisystem nutzt 16-Bit-Einträge. Danach werden Cluster aus 2^3 Blöcken verwendet.</p>
      <table>
        <tr><th>Teil</th><th>Frage</th></tr>
        <tr><td>a</td><td>Obergrenze einer Partition ohne Cluster?</td></tr>
        <tr><td>b</td><td>Obergrenze mit Clustern aus 2^3 Blöcken?</td></tr>
        <tr><td>c</td><td>Platzverbrauch einer 652-Byte-Datei ohne Cluster?</td></tr>
        <tr><td>d</td><td>Platzverbrauch derselben Datei mit Clustern?</td></tr>
        <tr><td>e</td><td>I-Node mit 8 direkten und 4 einfach indirekten Einträgen: maximale Dateigröße?</td></tr>
      </table>
      <p><strong>Hinweis:</strong> Rechne mit Zweierpotenzen und runde Plattenplatz auf ganze Blöcke oder Cluster.</p>
    </div>`;
}

function checkAnswers(mode) {
  const ex = currentExample(mode);
  let wrong = 0;
  const misses = [];
  ex.fields.forEach(field => {
    const input = $(`${mode}_${field.id}`);
    const actual = input.value;
    const ok = valueMatches(actual, field);
    input.classList.toggle("ok", ok);
    input.classList.toggle("bad", !ok);
    if (!ok) {
      wrong += 1;
      if (misses.length < 3) misses.push(field.label);
    }
  });
  const result = $(`${mode}Result`);
  result.className = `result ${wrong ? "bad" : "good"}`;
  result.innerHTML = wrong
    ? `<strong>Noch nicht.</strong> ${wrong} Feld(er) passen nicht. Prüfe besonders: ${misses.join(", ")}.`
    : "<strong>Richtig.</strong> Rechnung und Auswahl passen.";
  cacheAnswers(mode);
}

for (const mode of Object.keys(trainers)) {
  $(`${mode}ModeBtn`).addEventListener("click", () => renderMode(mode));
}

renderAllModes();
</script>
